steps:
  - name: gcr.io/cloud-builders/docker
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/lexguard:$SHORT_SHA', '.']

  - name: gcr.io/cloud-builders/docker
    args: ['push', 'gcr.io/$PROJECT_ID/lexguard:$SHORT_SHA']

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      [
        'run',
        'deploy',
        'lexguard',
        '--image',
        'gcr.io/$PROJECT_ID/lexguard:$SHORT_SHA',
        '--region',
        'us-central1',
        '--platform',
        'managed',
        '--allow-unauthenticated',
        '--set-env-vars',
        'PORT=8080',
      ]

images:
  - gcr.io/$PROJECT_ID/lexguard:$SHORT_SHA
