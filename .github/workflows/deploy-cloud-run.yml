name: Deploy to Cloud Run

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: ${{ secrets.GCP_PROJECT }}

      - name: Build & push backend image
        run: |
          IMAGE_BACKEND=${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/${{ secrets.ARTIFACT_REPO }}/backend:${{ github.sha }}
          gcloud builds submit --tag $IMAGE_BACKEND backend

      - name: Deploy backend to Cloud Run
        run: |
          IMAGE_BACKEND=${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/${{ secrets.ARTIFACT_REPO }}/backend:${{ github.sha }}
          gcloud run deploy lexguard-backend --image $IMAGE_BACKEND --region ${{ secrets.GCP_REGION }} --platform managed --allow-unauthenticated --set-env-vars PORT=8080

      - name: Build & push frontend image
        run: |
          IMAGE_FRONTEND=${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/${{ secrets.ARTIFACT_REPO }}/frontend:${{ github.sha }}
          gcloud builds submit --tag $IMAGE_FRONTEND frontend

      - name: Deploy frontend to Cloud Run
        run: |
          IMAGE_FRONTEND=${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/${{ secrets.ARTIFACT_REPO }}/frontend:${{ github.sha }}
          gcloud run deploy lexguard-frontend --image $IMAGE_FRONTEND --region ${{ secrets.GCP_REGION }} --platform managed --allow-unauthenticated

      - name: Output URLs
        run: |
          echo "Backend: $(gcloud run services describe lexguard-backend --region=${{ secrets.GCP_REGION }} --format='value(status.url)')"
          echo "Frontend: $(gcloud run services describe lexguard-frontend --region=${{ secrets.GCP_REGION }} --format='value(status.url)')"
